<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Fond blanc -->
  <circle cx="250" cy="250" r="249" fill="white"/>
  <!-- Arc rouge extérieur : de 7h clockwise par le haut jusqu'à 3h -->
  <path d="M143 436 A215 215 0 1 1 465 250" stroke="#C41E24" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Arc gris intérieur : de 10h par le bas jusqu'à 5h -->
  <path d="M86 155 A190 190 0 0 0 345 415" stroke="#888888" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- RFC -->
  <text x="250" y="258" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#111111" text-anchor="middle">RFC</text>
  <!-- Ligne séparatrice -->
  <line x1="55" y1="300" x2="445" y2="300" stroke="#8B1A1A" stroke-width="2.5"/>
  <!-- RESCUE FORMATION CONSEIL 83 -->
  <text x="250" y="336" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#111111" text-anchor="middle" letter-spacing="0.5">RESCUE FORMATION CONSEIL 83</text>
  <!-- SECURITE - INCENDIE - PREVENTION -->
  <text x="250" y="368" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="1.5">SECURITE - INCENDIE - PREVENTION</text>
</svg>
