[build]
  # `prisma generate` est déjà fait par le hook `postinstall` du package.json
  # (déclenché par `npm install` que Netlify exécute avant ce command).
  # `prisma db push` retiré : poussait le schéma à chaque déploiement (30-60s).
  # Désormais : `npx prisma db push` à faire manuellement en local après modif
  # de prisma/schema.prisma, avant commit. À terme : migrer vers `prisma
  # migrate deploy` + fichiers dans prisma/migrations/ (PR séparée à prévoir).
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Skip la télémétrie Next.js (gain ~2-5s par build)
  NEXT_TELEMETRY_DISABLED = "1"
  # Skip le check de version Prisma au build
  PRISMA_HIDE_UPDATE_MESSAGE = "1"

[functions]
  included_files = ["node_modules/pdfmake/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────────────────────────────────────
# Crons : DÉSACTIVÉS côté Netlify, remplacés par GitHub Actions Scheduled.
# ─────────────────────────────────────────────────────────────────────────────
# Raison : les [[crons]] natifs Netlify n'injectent pas de Bearer token et
# ne peuvent donc pas s'authentifier auprès des endpoints /api/cron/* depuis
# que CRON_SECRET est rendu obligatoire (security/sprint-0-hotfix).
# Le wiring est désormais dans .github/workflows/cron.yml.
# Si on revient un jour sur Netlify Scheduled Functions avec wrapper auth,
# restaurer ces blocs et adapter le workflow GitHub.
#
# [[crons]]
#   schedule = "0 8 * * *"
#   path = "/api/cron/evaluations"
#
# [[crons]]
#   schedule = "0 9 * * *"
#   path = "/api/cron/factures"
#
# [[crons]]
#   schedule = "*/15 * * * *"
#   path = "/api/cron/automations-v2"
#
# [[crons]]
#   schedule = "0 7 * * *"
#   path = "/api/cron/recyclages"
