<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Path for curved text following inner edge of red arc -->
    <path id="topTextPath" d="M 90 310 A 195 195 0 1 1 410 310"/>
  </defs>

  <!-- Red outer arc - top, thick -->
  <path d="M 60 330 A 222 222 0 1 1 440 330" stroke="#C41E24" stroke-width="44" fill="none" stroke-linecap="round"/>

  <!-- Gray inner arc - bottom, thinner -->
  <path d="M 108 350 A 168 168 0 0 0 392 350" stroke="#888888" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- Curved text: RESCUE FORMATION CONSEIL -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#333333" letter-spacing="3">
    <textPath href="#topTextPath" startOffset="7%">RESCUE FORMATION CONSEIL</textPath>
  </text>

  <!-- SÉCURITÉ - INCENDIE - PRÉVENTION -->
  <text x="250" y="318" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#777777" text-anchor="middle" letter-spacing="2">SÉCURITÉ - INCENDIE - PRÉVENTION</text>

  <!-- Flame icon centered -->
  <g transform="translate(250, 215)">
    <!-- Outer flame -->
    <path d="M0,-72 C-12,-54 -38,-28 -32,-3 C-26,20 -14,38 0,52 C14,38 26,20 32,-3 C38,-28 12,-54 0,-72 Z" fill="#C41E24"/>
    <!-- Inner flame highlight -->
    <path d="M0,-42 C-6,-28 -20,-10 -16,7 C-11,22 0,32 0,32 C0,32 11,22 16,7 C20,-10 6,-28 0,-42 Z" fill="#FF6622" opacity="0.8"/>
    <!-- Small inner core -->
    <path d="M0,-18 C-3,-10 -9,0 -7,9 C-4,16 0,20 0,20 C0,20 4,16 7,9 C9,0 3,-10 0,-18 Z" fill="#FFAA44" opacity="0.9"/>
  </g>
</svg>
