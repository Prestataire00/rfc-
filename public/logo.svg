<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Fond blanc -->
  <rect width="500" height="500" fill="white"/>

  <!-- Arc rouge extérieur : de 7h clockwise par le haut jusqu'à 3h -->
  <path d="M130 435 A215 215 0 1 1 462 252" stroke="#C41E24" stroke-width="32" fill="none" stroke-linecap="round"/>

  <!-- Arc gris intérieur : de 10h par le bas jusqu'à 5h -->
  <path d="M82 158 A188 188 0 0 0 348 418" stroke="#888888" stroke-width="19" fill="none" stroke-linecap="round"/>

  <!-- RFC -->
  <text x="250" y="218" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="108" font-weight="900" fill="#111111" text-anchor="middle">RFC</text>

  <!-- Ligne séparatrice -->
  <line x1="52" y1="256" x2="448" y2="256" stroke="#8B1A1A" stroke-width="2.2"/>

  <!-- RESCUE FORMATION CONSEIL -->
  <text x="250" y="290" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#111111" text-anchor="middle" letter-spacing="0.5">RESCUE FORMATION CONSEIL</text>

  <!-- SECURITE - INCENDIE - PREVENTION -->
  <text x="250" y="316" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#666666" text-anchor="middle" letter-spacing="2">SECURITE - INCENDIE - PREVENTION</text>

  <!-- Emblème flamme bas centre -->
  <g transform="translate(250, 388)">
    <!-- Cercle gris -->
    <circle cx="0" cy="0" r="32" fill="white" stroke="#999999" stroke-width="2.5"/>
    <!-- Flamme externe -->
    <path d="M0,-22 C-6,-14 -17,-4 -14,8 C-10,18 0,24 0,24 C0,24 10,18 14,8 C17,-4 6,-14 0,-22 Z" fill="#C41E24"/>
    <!-- Flamme interne -->
    <path d="M0,-11 C-3,-6 -9,1 -7,8 C-5,13 0,16 0,16 C0,16 5,13 7,8 C9,1 3,-6 0,-11 Z" fill="#FF5500" opacity="0.85"/>
    <!-- Centre clair -->
    <path d="M0,-3 C-2,0 -4,4 -3,7 C-1,9 0,11 0,11 C0,11 1,9 3,7 C4,4 2,0 0,-3 Z" fill="#FFAA44" opacity="0.9"/>
  </g>
</svg>
