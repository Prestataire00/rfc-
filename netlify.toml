[build]
  command = "npx prisma db push && npx prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["node_modules/pdfmake/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cron : envoi automatique évaluations à chaud (J+1) et à froid (J+21)
[[crons]]
  schedule = "0 8 * * *"
  path = "/api/cron/evaluations"

# Cron : détection automatique des factures en retard (tous les jours à 9h)
[[crons]]
  schedule = "0 9 * * *"
  path = "/api/cron/factures"

# Cron : execution horaire des automatisations V1 (convocations, evaluations, fiches, etc)
[[crons]]
  schedule = "0 * * * *"
  path = "/api/cron/automations"

# Cron V2 : moteur d'automatisation graphique (toutes les 15 min pour reactivite)
[[crons]]
  schedule = "*/15 * * * *"
  path = "/api/cron/automations-v2"

# Cron recyclages : detecte les certifications expirant J-60/J-30 (quotidien 7h)
[[crons]]
  schedule = "0 7 * * *"
  path = "/api/cron/recyclages"
